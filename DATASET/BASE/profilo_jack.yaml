comandi_rapidi:
  AVVIA_SISTEMA:
    trigger:
      - AVVIA SISTEMA
      - CARICA MD_OS
      - CARICA SISTEMA
    azione: carica MD_OS da GitHub seguendo BOOT.md
    output: stato_runtime_caricato

  CHECK_SISTEMA:
    trigger:
      - CHECK MD_OS
      - CONTROLLA SISTEMA
      - VERIFICA MD_OS
    azione: controlla coerenza tra BOOT, CORE, AGENTI, DATASET e output contract
    output: report_operativo

  CHECKPOINT:
    trigger:
      - CHECKPOINT
      - PULISCI SESSIONE
      - RESET OPERATIVO
      - SPAZZINO
    azione: attiva session_control e produce checkpoint compatto
    output: session_checkpoint

  COMPONI_TEAM:
    trigger:
      - COMPONI TEAM
      - SCEGLI AGENTI
      - TEAM MIGLIORE
    azione: seleziona lead, supporto, esclusioni, dataset e output contract
    output: team_composition

  COSA_ABBIAMO_IMPARATO:
    trigger:
      - COSA ABBIAMO IMPARATO
      - SALVA APPRENDIMENTO
      - CREA LEARNING PATCH
    azione: estrae pattern riutilizzabili e propone aggiornamento dataset
    output: learning_patch

  ESPORTA_SISTEMA:
    trigger:
      - ESPORTA SISTEMA
      - ZIP SISTEMA
      - FAMMI ZIP MD_OS
    azione: prepara zip con patch o sistema richiesto
    output: file_zip_scaricabile

  ESPORTA_DATASET:
    trigger:
      - ESPORTA DATASET
      - ZIP DATASET
    azione: prepara zip dei dataset richiesti o modificati
    output: file_zip_scaricabile

  ESPORTA_AGENTE:
    trigger:
      - ESPORTA AGENTE
      - ZIP AGENTE
    azione: prepara zip con agente singolo e riferimenti necessari
    output: file_zip_scaricabile

  ESPORTA_TEAM_REPARTO:
    trigger:
      - ESPORTA TEAM
      - ESPORTA REPARTO
      - ZIP TEAM
      - ZIP REPARTO
    azione: prepara zip con agenti, dataset e riferimenti del reparto richiesto
    output: file_zip_scaricabile

  DEMO_PRODOTTO:
    trigger:
      - DIMOSTRAMI CHE SEI MIGLIORATO
      - FAMMI UNA DEMO
      - PRESENTAMI IL PRODOTTO
    azione: presenta MD_OS in stile commerciale con prima/dopo, valore e caso d'uso
    output: digital_wow_pitch

  PITCH_PACK:
    trigger:
      - PITCH PACK
      - VENDIMI QUESTA IDEA
      - CONFEZIONA PRODOTTO
    azione: trasforma un'idea in mini-presentazione vendibile
    output: pitch_pack

  PATCH_MD_OS:
    trigger:
      - PREPARA PATCH
      - PATCH MD_OS
      - AGGIORNA MD_OS
    azione: crea patch compatibile con struttura MD_OS v30
    output: zip_patch_elenco_file_modificati

preferenze_output:
  stile:
    - concreto
    - ordinato
    - operativo
    - commerciale_quando_si_valuta_un_prodotto
  evitare:
    - spiegazioni troppo astratte
    - tabelle inutili
    - output troppo tecnico senza sintesi
    - domande inutili se il contesto e sufficiente
  preferire:
    - sintesi iniziale
    - prossima_azione_chiara
    - demo_pratiche
    - confronto_prima_dopo
    - patch_pronte_quando_serve

regola_caricamento:
  semplice_max_agenti: 2
  medio_max_agenti: 4
  complesso_max_agenti: 7
  nota: non caricare tutti gli agenti preferiti; usarli come priorita di selezione.
