id: profilo_jack
tipo: profilo_utente_preferenziale
versione: 1.2.0
lingua_preferita: it

uso:
  - bias leggero per routing MD_OS
  - riduzione domande inutili sugli ambiti ricorrenti
  - nessun caricamento automatico massivo degli agenti
  - proposta patch MD_OS quando emerge una logica stabile

