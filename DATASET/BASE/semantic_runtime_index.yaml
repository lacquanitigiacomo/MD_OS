id: semantic_runtime_index
tipo: indice_semantico_runtime
versione: 1.0.0

scopo:
  - collegare trigger, intent, agenti, dataset, funzioni e output contract
  - ridurre ricostruzione manuale del contesto
  - alleggerire il carico della sessione
  - rendere interrogabile la conoscenza operativa accumulata
  - simulare un indice semantico leggibile e versionabile

principio:
  - non salvare la chat completa
  - salvare coordinate operative
  - collegare ogni chunk a un uso pratico
  - usare l'indice per routing e selezione minima

coordinate_semantiche:
  trigger: parole o frasi di attivazione
  intent: scopo operativo riconosciuto
  ambito: area MD_OS coinvolta
  agenti: agenti consigliati
  dataset: dataset da caricare
  funzioni: funzioni da usare
  output_contract: formato di output
  regole: regole apprese o applicabili
  priorita: alta, media, bassa
  confidenza: alta, media, bassa

chunks_iniziali:
  - id: runtime_patch_v30_native
    intent: aggiornamento_md_os
    ambito: runtime
    trigger:
      - patch MD_OS
      - aggiorna sistema
      - crea zip
      - struttura v30
    regola: "Le patch MD_OS devono rispettare la struttura v30: CORE, DATASET, AGENTI/singoli e output_contracts."
    agenti:
      - session_director
      - learning_extractor
      - semantic_curator
    dataset:
      - DATASET/BASE/learning_rules.yaml
      - DATASET/BASE/semantic_runtime_index.yaml
    output_contract:
      - patch_md_os
    priorita: alta
    confidenza: alta

  - id: product_innovation_wow
    intent: sviluppo_prodotto_digitale
    ambito: prodotto_digitale
    trigger:
      - effetto wow
      - startup
      - prodotto digitale
      - demo prodotto
      - web app
    regola: "Per le idee digitali usare una pipeline prodotto: promessa, prima/dopo, demo, MVP, roadmap e prossima azione."
    agenti:
      - idea_accelerator
      - business_strategist
      - software_architect
      - ux_reviewer
      - copywriter
    dataset:
      - DATASET/PRODOTTO/digital_wow.yaml
      - DATASET/PRODOTTO/product_lab.yaml
      - DATASET/PRODOTTO/pitch_pack.yaml
    output_contract:
      - digital_wow_pitch
      - product_lab_brief
    priorita: alta
    confidenza: alta

  - id: session_cleanup
    intent: controllo_sessione
    ambito: runtime
    trigger:
      - checkpoint
      - pulisci sessione
      - reset operativo
      - spazzino
    regola: "Nelle sessioni lunghe mantenere decisioni attive, file prodotti, contesto utile e prossima azione; scartare rumore storico."
    agenti:
      - session_director
    dataset:
      - DATASET/BASE/session_runtime.yaml
    output_contract:
      - session_checkpoint
    priorita: alta
    confidenza: alta

uso_runtime:
  - cercare prima chunk pertinenti
  - caricare solo dataset e agenti collegati
  - se un chunk e obsoleto proporre aggiornamento
  - se manca un chunk per pattern ricorrente proporre learning_patch
