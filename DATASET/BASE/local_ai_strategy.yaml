id: local_ai_strategy
tipo: strategia_ai_locale_ibrida
versione: 1.0.0

scopo:
  - decidere quando usare AI locale, cloud o ibrida
  - valutare privacy, costo, qualità, velocità e complessità
  - preparare integrazioni future con LocalDocs, modelli locali e retrieval privato

criteri_decisione:
  locale_preferito:
    privacy:
      - documenti personali
      - dati lavoro
      - payroll
      - dataset privati
      - contenuti non condivisibili
    costo:
      - batch lunghi
      - elaborazioni ripetute
      - documenti numerosi
    offline:
      - assenza connessione
      - indipendenza da API
      - prototipi locali

  cloud_preferito:
    qualita:
      - ragionamento complesso
      - output raffinato
      - scrittura avanzata
      - ricerca web aggiornata
    integrazione:
      - strumenti cloud
      - collaborazione online
      - deployment rapido

  ibrido:
    quando:
      - estrazione locale
      - sintesi cloud
      - embedding locale
      - validazione cloud
      - documenti privati con output anonimizzato

strumenti_candidati:
  gpt4all:
    pattern:
      - desktop locale
      - python client
      - LocalDocs
      - no API obbligatorie
  llama_cpp:
    pattern:
      - runtime modelli GGUF
      - inferenza locale
  vector_db:
    pattern:
      - retrieval
      - memoria documentale
      - indicizzazione
