id: external_reference_ingestion
tipo: procedura_ingestione_riferimenti_esterni
versione: 1.0.0

scopo:
  - trasformare link e repository esterni in conoscenza MD_OS
  - applicare una pipeline ripetibile di analisi benchmark
  - produrre decisioni operative e patch candidate

pipeline:
  - acquisizione_riferimento
  - identificazione_tipo
  - lettura_fonti_minime
  - estrazione_pattern
  - scoring
  - confronto_con_md_os
  - decisione
  - proposta_integrazione
  - eventuale_patch

fonti_minime_repo:
  - README.md
  - docs principali se presenti
  - manifest o config se rilevanti
  - struttura cartelle
  - esempi di uso

decisioni_possibili:
  osservato: utile come contesto, non genera patch
  candidato: pattern utile, richiede disegno integrazione
  integrato: pattern trasformato in file MD_OS
  scartato: non adatto o troppo costoso

output_atteso:
  benchmark_integration_report:
    - riferimento
    - categoria
    - pattern_utili
    - pattern_da_scartare
    - adattamento_md_os
    - file_da_modificare
    - score
    - priorita
    - prossima_azione
