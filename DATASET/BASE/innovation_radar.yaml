id: innovation_radar
tipo: catalogo_benchmark_innovazione
versione: 1.0.0

scopo:
  - analizzare riferimenti esterni portati dall'utente
  - classificare repo, tool, framework, liste, articoli e pattern
  - distinguere ispirazione, benchmark, candidato e integrazione
  - trasformare segnali esterni in patch MD_OS quando hanno valore
  - evitare accumulo di link senza decisione

categorie:
  skill_systems:
    descrizione: sistemi basati su skill operative, istruzioni e reference
    esempi:
      - vercel-labs/agent-skills
  autonomous_agents:
    descrizione: agenti autonomi, task loop, goal-oriented agents
    esempi:
      - Significant-Gravitas/AutoGPT
  awesome_lists:
    descrizione: cataloghi curati di risorse, repo, tool e trend
    esempi:
      - sindresorhus/awesome-chatgpt
      - taishi-i/awesome-ChatGPT-repositories
  local_ai:
    descrizione: AI locale, offline, privacy, LocalDocs, modelli self-hosted
    esempi:
      - nomic-ai/gpt4all
  developer_tools:
    descrizione: strumenti per sviluppo, code review, CLI, deploy, documentazione
  product_tools:
    descrizione: strumenti per prodotto, UX, pitch, validazione e startup
  knowledge_management:
    descrizione: memoria, RAG, documenti, semantic search, vector DB
  multimodal:
    descrizione: audio, video, immagini, documenti complessi
  monitoring_eval:
    descrizione: valutazione, osservabilità, benchmark, scoring e reliability

schema_risorsa:
  nome: nome breve
  url: url o repo
  categoria: categoria innovation_radar
  tipo: repo | articolo | tool | lista | framework | libreria | dataset
  problema_risolto: cosa risolve
  pattern_utile: cosa vale integrare
  pattern_da_scartare: cosa non serve o appesantisce
  adattamento_md_os: come tradurlo in MD_OS
  file_da_modificare:
    - path
  priorita: alta | media | bassa
  costo: basso | medio | alto
  rischio: basso | medio | alto
  stato: osservato | candidato | integrato | scartato

riferimenti_iniziali:
  - nome: vercel-labs/agent-skills
    categoria: skill_systems
    tipo: repo
    pattern_utile:
      - skill autonome con SKILL.md
      - frontmatter con name, description, metadata
      - trigger Use when
      - references e scripts opzionali
    adattamento_md_os:
      - creare SKILLS layer
      - collegare skill a routing, agenti, dataset e output contract
    priorita: alta
    stato: candidato

  - nome: Significant-Gravitas/AutoGPT
    categoria: autonomous_agents
    tipo: repo
    pattern_utile:
      - task manager
      - agent loop
      - obiettivi e sottotask
      - feedback loop
    adattamento_md_os:
      - creare autonomous_task_loop
      - usare project queue e task state
    priorita: alta
    stato: candidato

  - nome: sindresorhus/awesome-chatgpt
    categoria: awesome_lists
    tipo: lista
    pattern_utile:
      - catalogazione per categorie
      - discovery ecosistema
      - risorse ordinate
    adattamento_md_os:
      - alimentare innovation radar
      - classificare riferimenti per categoria
    priorita: media
    stato: candidato

  - nome: nomic-ai/gpt4all
    categoria: local_ai
    tipo: repo
    pattern_utile:
      - AI locale
      - privacy
      - LocalDocs
      - no API obbligatorie
      - modelli locali
    adattamento_md_os:
      - creare local_ai_strategy
      - valutare cloud, locale o ibrido
    priorita: alta
    stato: candidato

  - nome: taishi-i/awesome-ChatGPT-repositories
    categoria: awesome_lists
    tipo: lista
    pattern_utile:
      - 2500+ repository curati
      - ricerca per topic, categoria e linguaggio
      - scoring per rilevanza, stelle e qualità
      - latest additions
    adattamento_md_os:
      - creare benchmark scoring
      - introdurre ranking risorse
      - creare scouting strutturato
    priorita: altissima
    stato: candidato

regola_finale:
  - ogni riferimento esterno deve produrre una decisione
  - non basta salvare il link
  - se non diventa pattern utile, resta osservato
  - se diventa pattern utile, passa a candidato
  - se genera patch, passa a integrato
