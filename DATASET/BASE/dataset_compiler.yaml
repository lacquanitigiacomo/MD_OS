id: dataset_compiler
tipo: compilatore_dataset
versione: 1.0.0

scopo:
  - trasformare apprendimenti in patch ordinate
  - scegliere il dataset giusto per ogni regola
  - evitare duplicati e frammentazione
  - mantenere MD_OS coerente e leggero

input:
  - learning_patch
  - semantic_chunk
  - dataset_esistenti
  - registry
  - routing

criteri_destinazione:
  profilo_utente:
    file: DATASET/BASE/profilo_jack.yaml
    quando:
      - preferenze operative dell'utente
      - comandi rapidi personali
      - ambiti ricorrenti
  runtime:
    file: DATASET/BASE/session_runtime.yaml
    quando:
      - regole di sessione
      - checkpoint
      - pulizia contesto
  semantica:
    file: DATASET/BASE/semantic_runtime_index.yaml
    quando:
      - trigger intent agenti dataset
      - chunk collegabili
      - routing semantico
  apprendimento:
    file: DATASET/BASE/learning_rules.yaml
    quando:
      - criteri per salvare conoscenza
      - schema apprendimento
  prodotto:
    file: DATASET/PRODOTTO/product_lab.yaml
    quando:
      - pipeline prodotto
      - MVP
      - demo
      - roadmap
  pitch:
    file: DATASET/PRODOTTO/pitch_pack.yaml
    quando:
      - presentazione
      - promessa
      - prima dopo
      - demo commerciale

procedura:
  - leggere chunk candidato
  - identificare ambito e intent
  - cercare duplicati
  - scegliere file destinazione
  - proporre patch minima
  - dichiarare impatto e rischio
  - aggiornare registry solo se nasce nuovo dataset

output:
  dataset_patch_plan:
    file_destinazione: path
    sezione: nome_sezione
    contenuto: patch proposta
    motivo: perche va li
    duplicati: trovati o assenti
    rischio: basso_medio_alto
    priorita: alta_media_bassa
