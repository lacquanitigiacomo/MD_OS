id: team_composer
tipo: dataset_composizione_team
versione: 1.0.0

scopo:
  - scegliere pochi agenti giusti invece di molti agenti generici
  - ridurre lentezza e rumore
  - dichiarare lead, supporto ed esclusioni
  - collegare agenti, dataset, funzioni e output contract

principi:
  - massimo impatto con minimo team
  - un solo agente lead
  - agenti supporto solo se aggiungono competenza reale
  - dataset prima di agenti aggiuntivi
  - esclusioni motivate per evitare sovraccarico

dimensioni_team:
  semplice:
    max_agenti: 2
    uso: richiesta chiara, singolo ambito, output breve
  medio:
    max_agenti: 4
    uso: progetto con più aspetti ma scopo definito
  complesso:
    max_agenti: 7
    uso: progetto multi-area con output strutturato

schema_composizione:
  task: richiesta interpretata
  agente_lead: agente responsabile della direzione
  agenti_supporto: agenti con contributo specifico
  agenti_esclusi: agenti non caricati e motivo
  dataset_da_caricare: dataset necessari
  funzioni_da_usare: funzioni dichiarate
  output_contract: formato finale richiesto

team_preferiti:
  prodotto_digitale_wow:
    lead: idea_accelerator
    supporto:
      - salto_qualitativo_architect
      - software_architect
      - ux_reviewer
      - copywriter
    output_contract: digital_wow_pitch

  web_app_tecnica:
    lead: software_architect
    supporto:
      - senior_full_stack_developer
      - ux_reviewer
      - api_architect
    output_contract: roadmap_mvp

  debug_tecnico:
    lead: senior_full_stack_developer
    supporto:
      - software_architect
      - qa_engineer
      - security_engineer
    output_contract: diagnosi_tecnica

  pitch_commerciale:
    lead: business_strategist
    supporto:
      - copywriter
      - presentation_designer
      - ux_reviewer
    output_contract: pitch_pack

  apprendimento_dataset:
    lead: knowledge_manager
    supporto:
      - ricercatore_documentale
      - redattore_report
    output_contract: learning_patch

regola_finale:
  - se un agente non cambia il risultato, non caricarlo
  - se due agenti si sovrappongono, scegliere quello più vicino al task
  - se manca dataset, proporre patch invece di improvvisare
