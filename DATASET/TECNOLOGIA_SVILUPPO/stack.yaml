id: stack_tecnologico
items:
  nextjs:
    when:
    - web app
    - seo
    - dashboard
    - mvp
    strengths:
    - fullstack
    - routing
    - deploy rapido
    risks:
    - vendor/runtime complexity
  react:
    when:
    - ui dinamica
    - componenti
    strengths:
    - ecosistema
    - componenti
    risks:
    - stato complesso
  nodejs:
    when:
    - api js
    - backend realtime
    strengths:
    - same language
    - ecosistema
    risks:
    - async bugs
  postgresql:
    when:
    - dati relazionali
    - report
    - utenti
    strengths:
    - affidabile
    - query robuste
    risks:
    - schema design
  python:
    when:
    - automazioni
    - data
    - calcoli
    strengths:
    - script
    - dataset
    - AI tooling
    risks:
    - env/dependency
