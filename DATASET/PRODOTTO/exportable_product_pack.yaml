id: exportable_product_pack
tipo: pacchetto_prodotto_esportabile
versione: 1.0.0

scopo:
  - trasformare una proposta prodotto in cartella pronta
  - creare asset leggibili da sviluppatori, partner o clienti
  - rendere esportabile il lavoro di MD_OS

struttura_cartella:
  PROJECT_NAME:
    - README.md
    - PRODUCT_BRIEF.md
    - MVP_SCOPE.md
    - ROADMAP.md
    - ARCHITECTURE.md
    - UX_FLOW.md
    - PITCH.md
    - BACKLOG.md
    - DATASET/

file:
  README.md:
    contenuto:
      - descrizione breve
      - promessa
      - stato progetto
      - prossima azione
  PRODUCT_BRIEF.md:
    contenuto:
      - problema
      - target
      - soluzione
      - valore
      - rischi
  MVP_SCOPE.md:
    contenuto:
      - funzioni incluse
      - funzioni escluse
      - criteri successo
  ROADMAP.md:
    contenuto:
      - 30 giorni
      - 60 giorni
      - 90 giorni
  ARCHITECTURE.md:
    contenuto:
      - stack
      - componenti
      - dati
      - integrazioni
  UX_FLOW.md:
    contenuto:
      - flusso principale
      - schermate chiave
      - frizioni da evitare
  PITCH.md:
    contenuto:
      - headline
      - prima dopo
      - demo
      - call to action
  BACKLOG.md:
    contenuto:
      - task
      - priorita
      - dipendenze

regole:
  - esportare solo quando idea e MVP sono sufficientemente chiari
  - non creare architettura falsa se non definita
  - marcare assunzioni e limiti
  - preferire asset brevi e usabili
