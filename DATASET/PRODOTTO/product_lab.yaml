id: product_lab
tipo: laboratorio_prodotto_digitale
versione: 1.0.0

scopo:
  - trasformare idee grezze in prodotti sviluppabili
  - collegare strategia, UX, tecnologia, MVP e validazione
  - creare una pipeline ripetibile per innovazione prodotto

pipeline:
  - idea_grezza
  - problema_reale
  - target
  - promessa_prodotto
  - prima_dopo
  - esperienza_principale
  - funzioni_core
  - MVP_scope
  - stack_o_strumenti
  - demo_script
  - esperimento_validazione
  - roadmap_30_60_90
  - rischi
  - prossima_azione

regole:
  - partire dal problema, non dalla feature
  - una promessa deve essere chiara in una frase
  - MVP significa tagliare, non accumulare
  - la demo deve essere descrivibile in 5 passaggi
  - ogni roadmap deve avere azioni concrete
  - se manca target, proporre target iniziale plausibile

output_minimo:
  product_lab_brief:
    promessa_prodotto: frase breve
    target: utente principale
    problema: frizione reale
    prima_dopo: trasformazione
    MVP: funzioni essenziali
    demo: scena d'uso
    stack: strumenti o architettura
    roadmap: 30_60_90
    rischio: rischio principale
    prossima_azione: passo immediato

anti_pattern:
  - troppe feature nel primo MVP
  - nessuna scena demo
  - target troppo generico
  - promessa astratta
  - roadmap senza tagli
