boot_sequence:
  - read: MANIFEST.md
  - read: CORE/config.yaml
  - load_registry:
      - REGISTRY/agents.registry.yaml
      - REGISTRY/datasets.registry.yaml
      - REGISTRY/skills.registry.yaml
      - REGISTRY/functions.registry.yaml
      - REGISTRY/outputs.registry.yaml
  - load_core:
      - CORE/routing.yaml
      - CORE/output_contracts.yaml
      - CORE/serverless_invocation.yaml
  - consult_mesh:
      - MESH/schema_mesh_index.yaml
      - MESH/capability_index.yaml
  - build_runtime_packet: true
  - execute_selected_skill: true
  - quality_gate: CORE/quality_gate.yaml
