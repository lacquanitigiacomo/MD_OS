rules:
  - id: ten_x_leap
    match:
      - salto 10x
      - effetto wow
      - rivoluzionare
      - geniale
      - formula mega
    mode: TEN_X_LEAP
    agents:
      - innovation_board_director
      - first_principles_genius
      - leverage_hunter
      - systems_visionary
      - table_output_specialist
    datasets:
      - DATASETS/BASE/area_increment_matrix.yaml
      - DATASETS/BASE/innovation_board_plus.yaml
      - DATASETS/BASE/ten_x_leap_rule.yaml
    skills:
      - refactor-10x
      - semantic-runtime
    output: ten_x_leap_report

  - id: refactor_tabula_rasa
    match:
      - tabula rasa
      - refactor totale
      - butto via tutto
      - repo nuovo
      - distribuzione completa
    mode: TABULA_RASA_REFACTOR
    agents:
      - refactor_architect
      - innovation_board_director
      - regression_guard
      - evidence_linker
    datasets:
      - DATASETS/BASE/refactor_10x_protocol.yaml
      - DATASETS/BASE/refactor_preservation_guard.yaml
    skills:
      - refactor-10x
    output: refactor_10x_plan

  - id: innovation_board
    match:
      - innovation board
      - team completo
      - specialisti ai
      - visionari
      - geni
      - 10 incrementi
    mode: INNOVATION_BOARD
    agents:
      - innovation_board_director
      - ai_model_strategist
      - systems_inventor
      - scenario_analyst
      - data_integration_architect
      - first_principles_genius
    datasets:
      - DATASETS/BASE/innovation_board_plus.yaml
      - DATASETS/BASE/area_increment_matrix.yaml
    output: innovation_board_result

  - id: product_lab
    match:
      - product lab
      - idea in prodotto
      - mvp completo
      - prodotto digitale
    mode: PRODUCT_LAB
    agents:
      - product_lab_director
      - idea_accelerator
      - business_strategist
      - software_architect
      - ux_reviewer
    datasets:
      - DATASETS/PRODUCT/product_lab.yaml
      - DATASETS/PRODUCT/digital_wow.yaml
    skills:
      - product-lab
    output: product_lab_brief

  - id: external_radar
    match:
      - analizza github
      - benchmark repo
      - radar innovazione
      - integriamo questo
    mode: EXTERNAL_RADAR
    agents:
      - innovation_radar_curator
      - benchmark_analyst
      - dataset_compiler
    datasets:
      - DATASETS/BASE/innovation_radar.yaml
      - DATASETS/BASE/benchmark_scoring.yaml
    skills:
      - external-radar
    output: benchmark_integration_report

  - id: analysis_work
    match:
      - analisi lavoro
      - busta paga
      - cedolino
      - ccnl
      - payroll
    mode: ANALYSIS_WORK
    agents:
      - revisore_cedolini
      - consulente_lavoro
      - analista_ccnl
      - data_extraction_architect
      - evidence_linker
    datasets:
      - DATASETS/WORK_PROFESSIONS/dataset_operativo.yaml
      - DATASETS/WORK_PROFESSIONS/voci_busta_paga.yaml
      - DATASETS/WORK_PROFESSIONS/ccnl.yaml
    output: audit_payroll
