rules:
- id: semantic_runtime
  match:
  - indice semantico
  - semantic index
  - memoria semantica
  - chunk semantico
  - coordinate operative
  mode: SEMANTIC_RUNTIME
  agents:
  - semantic_curator
  - learning_extractor
  datasets:
  - DATASET/BASE/semantic_runtime_index.yaml
  - DATASET/BASE/memory_chunk_schema.yaml
  - DATASET/BASE/learning_rules.yaml
  functions:
  - compose_context
  - propose_patch
  output: semantic_chunk

- id: dataset_compilation
  match:
  - compila dataset
  - dove salviamo
  - aggiorna dataset
  - dataset patch
  - organizza apprendimento
  mode: DATASET_COMPILATION
  agents:
  - dataset_compiler
  - semantic_curator
  datasets:
  - DATASET/BASE/dataset_compiler.yaml
  - DATASET/BASE/semantic_runtime_index.yaml
  - DATASET/BASE/profilo_jack.yaml
  functions:
  - compose_context
  - propose_patch
  output: dataset_patch_plan

- id: product_lab
  match:
  - product lab
  - laboratorio prodotto
  - sviluppa prodotto
  - idea in prodotto
  - validiamo idea
  - mvp completo
  mode: PRODUCT_LAB
  agents:
  - product_lab_director
  - idea_accelerator
  - business_strategist
  - software_architect
  - ux_reviewer
  datasets:
  - DATASET/PRODOTTO/product_lab.yaml
  - DATASET/PRODOTTO/digital_wow.yaml
  - DATASET/PRODOTTO/mvp.yaml
  functions:
  - compose_context
  - build_mvp_scope
  - generate_roadmap
  - find_leverage_point
  output: product_lab_brief

- id: agent_council
  match:
  - council
  - dibattito agenti
  - fai discutere gli agenti
  - decisione complessa
  - confronto agenti
  mode: AGENT_COUNCIL
  agents:
  - council_moderator
  - business_strategist
  - software_architect
  - ux_reviewer
  datasets:
  - DATASET/BASE/agent_council.yaml
  - DATASET/BASE/team_composer.yaml
  functions:
  - compose_context
  - risk_matrix
  output: council_decision

- id: export_product_pack
  match:
  - export product pack
  - esporta prodotto
  - pacchetto prodotto
  - zip prodotto
  - crea cartella prodotto
  mode: EXPORT_PRODUCT_PACK
  agents:
  - product_packager
  - product_lab_director
  - redattore_report
  datasets:
  - DATASET/PRODOTTO/exportable_product_pack.yaml
  - DATASET/PRODOTTO/product_lab.yaml
  functions:
  - compose_context
  output: product_pack_manifest

- id: session_control
  match:
  - checkpoint
  - pulisci memoria
  - reset operativo
  - spazzino
  - direttore sessione
  - sessione lunga
  - tieni ultimi dati
  - comprimi contesto
  mode: SESSION_CONTROL
  agents:
  - session_director
  datasets:
  - DATASET/BASE/session_runtime.yaml
  - DATASET/BASE/profilo_jack.yaml
  functions:
  - compose_context
  - propose_patch
  output: session_checkpoint

- id: team_composition
  match:
  - componi team
  - scegli agenti
  - che agenti usiamo
  - reparto migliore
  - team migliore
  - squadra agenti
  mode: TEAM_COMPOSITION
  agents:
  - team_composer
  - knowledge_manager
  datasets:
  - DATASET/BASE/team_composer.yaml
  - DATASET/BASE/profilo_jack.yaml
  functions:
  - compose_context
  - route_request
  output: team_composition

- id: learning_extractor
  match:
  - cosa abbiamo imparato
  - salva apprendimento
  - apprendi da questa sessione
  - pattern ricorrente
  - crea learning patch
  mode: LEARNING_EXTRACTOR
  agents:
  - learning_extractor
  - knowledge_manager
  datasets:
  - DATASET/BASE/learning_rules.yaml
  - DATASET/BASE/profilo_jack.yaml
  functions:
  - compose_context
  - propose_patch
  output: learning_patch

- id: pitch_pack
  match:
  - pitch pack
  - presentazione prodotto
  - vendimi questa idea
  - demo investitore
  - demo commerciale
  - confeziona prodotto
  mode: PITCH_PACK
  agents:
  - idea_accelerator
  - business_strategist
  - copywriter
  - presentation_designer
  - ux_reviewer
  datasets:
  - DATASET/PRODOTTO/pitch_pack.yaml
  - DATASET/PRODOTTO/digital_wow.yaml
  - DATASET/BASE/profilo_jack.yaml
  functions:
  - compose_context
  - build_mvp_scope
  - find_leverage_point
  output: pitch_pack

- id: jack_digital_wow
  match:
  - wow
  - effetto wow
  - startup
  - prodotto digitale
  - app
  - web app
  - videogame
  - tecnologie futuro
  - tecnologie del futuro
  - innovazione digitale
  - soluzione digitale
  - sviluppa soluzione
  - presentami il prodotto
  - demo prodotto
  mode: JACK_DIGITAL_WOW
  agents:
  - idea_accelerator
  - salto_qualitativo_architect
  - business_strategist
  - software_architect
  - senior_full_stack_developer
  - ai_engineer
  - automation_architect
  - ux_reviewer
  - web_designer
  - grafico
  - copywriter
  - redattore_report
  datasets:
  - DATASET/BASE/profilo_jack.yaml
  - DATASET/PRODOTTO/mvp.yaml
  - DATASET/PRODOTTO/digital_wow.yaml
  - DATASET/TECNOLOGIA_SVILUPPO/stack.yaml
  - DATASET/TECNOLOGIA_SVILUPPO/pattern.yaml
  - DATASET/DESIGN_COMUNICAZIONE/ux.yaml
  functions:
  - compose_context
  - build_mvp_scope
  - suggest_stack
  - generate_roadmap
  - find_leverage_point
  - anti_briciole
  - propose_patch
  output: digital_wow_pitch

- id: sviluppo_idee_rapido
  match:
  - idea
  - mvp
  - prototipo
  - prodotto
  - startup
  - sviluppare
  mode: SVILUPPO_IDEE_RAPIDO
  agents:
  - idea_accelerator
  - salto_qualitativo_architect
  - business_strategist
  - software_architect
  - ux_reviewer
  - redattore_report
  datasets:
  - DATASET/PRODOTTO/mvp.yaml
  - DATASET/TECNOLOGIA_SVILUPPO/stack.yaml
  - DATASET/DESIGN_COMUNICAZIONE/ux.yaml
  functions:
  - compose_context
  - build_mvp_scope
  - suggest_stack
  - generate_roadmap
  - find_leverage_point
  output: roadmap_mvp

- id: audit_payroll
  match:
  - busta paga
  - cedolino
  - ccnl
  - tfr
  - rol
  - ferie
  - notturno
  mode: AUDIT_DOCUMENTALE
  agents:
  - revisore_cedolini
  - consulente_lavoro
  - commercialista
  - analista_ccnl
  - revisore_orari_turni
  datasets:
  - DATASET/LAVORO_PROFESSIONI/voci_busta_paga.yaml
  - DATASET/LAVORO_PROFESSIONI/ccnl.yaml
  - DATASET/LAVORO_PROFESSIONI/anomalie_payroll.yaml
  - DATASET/ECONOMIA_FINANZA/fiscale_lavoro.yaml
  functions:
  - extract_payroll_items
  - cross_check_ccnl
  - calculate_ratei
  - detect_payroll_anomalies
  output: audit_payroll

- id: debug_tecnico
  match:
  - bug
  - errore
  - codice
  - api
  - database
  - deploy
  mode: DEBUG_TECNICO
  agents:
  - senior_full_stack_developer
  - software_architect
  - security_engineer
  - qa_engineer
  datasets:
  - DATASET/TECNOLOGIA_SVILUPPO/stack.yaml
  - DATASET/TECNOLOGIA_SVILUPPO/security.yaml
  - DATASET/TECNOLOGIA_SVILUPPO/pattern.yaml
  functions:
  - compose_context
  - check_security_flags
  - risk_matrix
  output: diagnosi_tecnica

- id: salto_qualitativo
  match:
  - salto qualità
  - geniale
  - stupiscimi
  - semplifica
  - bocca aperta
  - ci arriva prima
  mode: SALTO_QUALITATIVO
  agents:
  - salto_qualitativo_architect
  - knowledge_manager
  - software_architect
  - business_strategist
  datasets:
  - DATASET/BASE/contesto_base.yaml
  - DATASET/DATI_RICERCA/sintesi.yaml
  functions:
  - compose_context
  - find_leverage_point
  - anti_briciole
  - propose_patch
  output: mossa_decisiva
